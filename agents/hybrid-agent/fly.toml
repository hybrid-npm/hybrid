app = 'hybrid-agent'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[env]
  AGENT_PORT = '4100'
  XMTP_ENV = 'production'

[[services]]
  protocol = 'tcp'
  internal_port = 4100

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
