name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Publish packages to npm
        run: |
          for pkg in packages/types packages/memory packages/scheduler packages/utils packages/create-hybrid packages/cli packages/channels; do
            [ -f "$pkg/package.json" ] || continue
            name=$(node -p "require('./${pkg}/package.json').name")
            version=$(node -p "require('./${pkg}/package.json').version")

            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "✓ $name@$version already published"
            else
              echo "Publishing $name@$version..."
              (cd "$pkg" && npm publish --access public --provenance) || echo "skipped $pkg"
            fi
          done